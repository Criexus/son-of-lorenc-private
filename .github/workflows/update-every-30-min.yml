name: Update Son of Lorenc Dashboard

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: son-of-lorenc-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update data
        run: python scripts/update_data.py

      - name: Commit updated data
        run: |
          git config user.name "son-of-lorenc-bot"
          git config user.email "son-of-lorenc-bot@users.noreply.github.com"
          git add data/
          git commit -m "Auto update Son of Lorenc data" || echo "No changes to commit"
          git push
